name: Run Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
  
  # Allow API/manual trigger (REQUIRED for 5-min setup)
  workflow_dispatch:

  # Optional: closest possible schedule inside GitHub
  schedule:
    - cron: "*/15 * * * *"        # every 15 mins
    - cron: "5-59/15 * * * *"     # offset
    - cron: "10-59/15 * * * *"    # offset

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: mvn clean install -DskipTests

      - name: Run Selenium Tests
        run: mvn test
